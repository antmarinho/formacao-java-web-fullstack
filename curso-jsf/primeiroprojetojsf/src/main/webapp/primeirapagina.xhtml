<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Frameset//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-frameset.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://java.sun.com/jsf/html">

<h:head>
	<title>Ola jsf</title>
</h:head>
<h:body>
	<h:form>
		<h1>da pra misturar html com jsf</h1>
		<table></table>
		Nome:
		<h:inputText id="nome" value="#{pessoaBean.nome}"/>
		<br/>
		<h:commandButton binding="#{pessoaBean.commandButton}" value="add nome" action="#{pessoaBean.addNome}"/>
		<br/>
		<h:dataTable value="#{pessoaBean.nomes}" var="nome">
			<h:column>
				<h:outputText value="#{nome}"/>
				<br/>
			</h:column>
		</h:dataTable>
	</h:form>
</h:body>
</html>
