<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Frameset//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-frameset.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<h:head>
    <title>Ola jsf</title>
</h:head>
<h:body>
    <h:form id="formPessoa">
        <h:graphicImage height="80px" width="80px" value="https://www.cin.ufpe.br/~acgm/acgm.png"/>
        <h1>Ola JSF</h1>
        <h:panelGrid columns ="2">
            <f:facet name="header">
                <h:outputText value="Cadastro JSF"/>
            </f:facet>
            <h:outputLabel value="Id"/>
            <h:inputText value="#{pessoaBean.pessoa.id}" readonly="true"/>
            <h:outputLabel value="Nome"/>
            <h:inputText value="#{pessoaBean.pessoa.nome}"/>
            <h:outputLabel value="Sobrenome"/>
            <h:inputText value="#{pessoaBean.pessoa.sobrenome}"/>
            <h:outputLabel value="Idade"/>
            <h:inputText value="#{pessoaBean.pessoa.idade}"/>
            <h:outputLabel value="Sexo"/>
            <h:selectOneMenu id="campoSexo" value="#{pessoaBean.pessoa.sexo}">
                <f:selectItem itemValue="" itemLabel="Selecione" noSelectionOption="true"/>
                <f:selectItem itemValue="H" itemLabel="Masculino"/>
                <f:selectItem itemValue="M" itemLabel="Feminino"/>
            </h:selectOneMenu>

            <h:outputLabel value="Frameworks"/>
            <h:selectManyMenu id="campoframeworks" value="#{pessoaBean.pessoa.frameworks}">
                <f:selectItem itemValue="Hibernate"/>
                <f:selectItem itemValue="Spring Mvc"/>
                <f:selectItem itemValue="JPA"/>
                <f:selectItem itemValue="JSF"/>
                <f:selectItem itemValue="ReactJs"/>
            </h:selectManyMenu>

            <h:outputLabel value="Ativo"/>
            <h:selectBooleanCheckbox value="#{pessoaBean.pessoa.ativo}"/>

            <h:outputLabel/>
            <h:panelGroup>
                <h:commandButton value="Salvar" action="#{pessoaBean.salvar}"/>
                <h:commandButton value="Novo" action="#{pessoaBean.novo}"/>
                <h:commandButton value="Deletar" action="#{pessoaBean.deletar}"/>
            </h:panelGroup>
        </h:panelGrid>

        <h:dataTable value="#{pessoaBean.pessoas}" var="pessoa" border="2" cellpadding="6">

            <f:facet name="header">
                Lista de pessoas cadastradas
            </f:facet>

            <h:column>
                <f:facet name="header">ID</f:facet>
                <h:outputText value="#{pessoa.id}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Nome</f:facet>
                <h:outputText value="#{pessoa.nome}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Sobrenome</f:facet>
                <h:outputText value="#{pessoa.sobrenome}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Editar</f:facet>
                <h:commandLink value="Editar">
                    <f:setPropertyActionListener target="#{pessoaBean.pessoa}" value="#{pessoa}"/>
                </h:commandLink>
            </h:column>
            <h:column>
                <f:facet name="header">Excluir</f:facet>
                <h:commandLink value="Excluir" action="#{pessoaBean.deletar}">
                    <f:setPropertyActionListener target="#{pessoaBean.pessoa}" value="#{pessoa}"/>
                </h:commandLink>
            </h:column>
        </h:dataTable>

    </h:form>
</h:body>
</html>
